<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyPwn</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="nav-wrap">
    <div class="container nav-inner">
      <div class="brand">
        <img class="brand-logo" src="assets/images/cypwn-logo.png" alt="CyPwn logo">
        <span>CyPwn</span>
      </div>
      <ul class="nav-links">
        <li><a href="#">CyPwn Repo</a></li>
        <li><a href="#">Discord</a></li>
        <li><a href="#">AppSnake</a></li>
        <li><a href="#">Donate</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </div>
  </nav>

  <main class="container">
    <section class="logo-section">
      <img class="hero-logo" src="assets/images/cypwn-logo.png" alt="CyPwn app logo">
    </section>

    <section class="tabs">
      <button class="tab active" type="button">IPAs</button>
      <button class="tab" type="button">TrollStore</button>
    </section>

    <section class="repo-buttons">
      <a class="repo-btn alt" href="#">Add to AltStore</a>
      <a class="repo-btn esign" href="#">Add to ESign</a>
      <a class="repo-btn scarlet" href="#">Add to Scarlet</a>
      <a class="repo-btn krava" href="#">Add to KravaSigner</a>
      <a class="repo-btn sidestore" href="#">Add to SideStore</a>
    </section>

    <section class="search-wrap">
      <input id="searchInput" type="search" placeholder="Search IPAs...">
      <select id="categoryFilter">
        <option value="all">All Categories</option>
      </select>
      <button id="clearBtn" type="button">x</button>
    </section>

    <section class="results-row">
      <p id="resultText">Loading...</p>
    </section>

    <section id="cards" class="cards"></section>
  </main>

  <dialog id="appModal" class="modal">
    <button id="closeModal" class="close" type="button">x</button>
    <div id="modalBody"></div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
